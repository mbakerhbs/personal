  .toggle-btn {
    padding: 9px 26px; border-radius: 22px; border: 2px solid var(--navy);

// Time parsing for sort: "8:30 AM" etc. Also raw sortMin can be given directly.
function tm(t) {
  if (t === "Early AM") return 270;               // 4:30a
  if (t === "After Dinner") return 1230;          // 8:30p
  const pm = t.includes("PM");
  const [h, m] = t.replace(/ AM| PM/g,"").split(":").map(Number);
  let hr = h % 12; if (pm) hr += 12;
  return hr*60 + (m||0);
}

function App() {
  const [view, setView] = useState("list");
  const [acts, setActs] = useState(ACTS.map(a => ({...a, scheduled: []})));
  const [filter, setFilter] = useState("all");

  const addSched = (id, day, time) =>
    setActs(p => p.map(a => a.id === id ? {...a, scheduled: [...a.scheduled, {day, time}]} : a));
  const rmSched = (id, idx) =>
    setActs(p => p.map(a => a.id === id ? {...a, scheduled: a.scheduled.filter((_,i)=>i!==idx)} : a));

  const pinCount = acts.reduce((n,a)=>n+a.scheduled.length,0);

  return (
    <div>
      <div className="masthead">
        <h1>⚓ Vinalhaven Activities</h1>
        <div className="dates">July 3 – 5, 2026</div>
        <div className="place">Fox Islands · Penobscot Bay · Maine</div>
      </div>

      <div className="toggle-row">
        <button className={`toggle-btn ${view==="list"?"active":"inactive"}`} onClick={()=>setView("list")}>📋 List</button>
        <button className={`toggle-btn ${view==="calendar"?"active":"inactive"}`} onClick={()=>setView("calendar")}>📅 Calendar{pinCount>0?` · ${pinCount} pinned`:""}</button>
      </div>

      {view==="calendar" && <CalView acts={acts}/>}
      {view==="list" && <ListView acts={acts} filter={filter} setFilter={setFilter} onAdd={addSched} onRm={rmSched}/>}
    </div>
  );
}

function ListView({acts, filter, setFilter, onAdd, onRm}) {
  const catKeys = Object.keys(CATS);
  const shown = filter==="all" ? catKeys : [filter];
  return (
    <div>
      <div className="filters">
        <button className="filter-pill"
          style={{background:filter==="all"?"#14304d":"#fff",color:filter==="all"?"#fff":"#33424f",borderColor:"#c8d4dd"}}
          onClick={()=>setFilter("all")}>All</button>
        {catKeys.map(k=>{
          const c=CATS[k];
          return <button key={k} className="filter-pill" onClick={()=>setFilter(k)}
            style={{background:filter===k?c.color:c.bg,color:filter===k?"#fff":c.color,borderColor:c.color+"30"}}>{c.label}</button>;
        })}
      </div>
      <div className="hint">Pin any activity to a day & time with the dropdowns — pins appear in the Calendar alongside the fixed schedule</div>

      {shown.map(k=>{
        const c=CATS[k];
        const items = acts.filter(a=>a.cat===k);
        if (!items.length) return null;
        return (
          <div key={k}>
            <div className="section-head">
              <span className="dot" style={{background:c.color}}></span>
              <h2 style={{color:c.color}}>{c.label}</h2>
              <span className="rule"></span>
            </div>
            {items.map(a=><Card key={a.id} a={a} onAdd={onAdd} onRm={onRm}/>)}
          </div>
        );
      })}
      <RefBox/>
    </div>
  );
}

function Card({a, onAdd, onRm}) {
  const [day,setDay]=useState(""); const [time,setTime]=useState("");
  const c = CATS[a.cat];
  const doAdd = ()=>{ if(day&&time){onAdd(a.id,day,time);setDay("");setTime("");} };
  return (
    <div className="card" style={{borderLeftColor:c.color}}>
      <div className="card-head">
        <div className="card-title">{a.title}</div>
        {a.hours && <span className="hours-chip" style={{background:c.bg,color:c.color}}>{a.hours}</span>}
      </div>
      <div className="card-detail">{a.detail}</div>
      {a.flagText && <div><span className="flag">⚠ {a.flagText}</span></div>}
      {(a.link||a.link2) && <div className="card-links">
        {a.link && <a href={a.link} target="_blank" rel="noopener noreferrer">{a.linkLabel||"Info"} ↗</a>}
        {a.link2 && <a href={a.link2} target="_blank" rel="noopener noreferrer">{a.linkLabel2||"Info"} ↗</a>}
      </div>}
      {a.scheduled.length>0 && <div className="sched-tags">
        {a.scheduled.map((s,i)=>(
          <span key={i} className="sched-tag">
            📌 {DAYS[DAY_KEYS.indexOf(s.day)]} @ {s.time}
            <button onClick={()=>onRm(a.id,i)} aria-label="Remove">×</button>
          </span>
        ))}
      </div>}
      <div className="add-row">
        <select value={day} onChange={e=>setDay(e.target.value)}>
          <option value="">Pin to day…</option>
          {DAY_KEYS.map((k,i)=><option key={k} value={k}>{DAYS[i]} ({DAY_SUB[i].split(" ·")[0]})</option>)}
        </select>
        <select value={time} onChange={e=>setTime(e.target.value)}>
          <option value="">Time…</option>
          {TIMES.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        <button className={`add-btn ${day&&time?"enabled":"disabled"}`} onClick={doAdd} disabled={!day||!time}>📌 Pin</button>
      </div>
    </div>
  );
}

function CalView({acts}) {
  // Combine fixed openings + user pins per day
  const byDay = {fri:[], sat:[], sun:[]};
  acts.forEach(a=>{
    (a.openings||[]).forEach(o=>{
      byDay[o.day].push({ act:a, time:o.time, note:o.note, sm:o.sortMin, pinned:false });
    });
    a.scheduled.forEach(s=>{
      byDay[s.day].push({ act:a, time:s.time, note:a.hours||"", sm:tm(s.time), pinned:true });
    });
  });
  DAY_KEYS.forEach(k=>byDay[k].sort((x,y)=>x.sm-y.sm));

  return (
    <div>
      <div className="cal-legend">
        Pre-filled with everything that has fixed hours or tide windows · <span className="cal-pin">PINNED</span> = items you added from the List
      </div>
      <div className="cal-grid">
        {DAY_KEYS.map((dk,di)=>{
          const t=TIDES[dk];
          return (
            <div key={dk} className="cal-col">
              <div className={`cal-header ${dk}`}>
                <div className="dow">{DAYS[di]}</div>
                <div className="dnum">{DAY_SUB[di]}</div>
              </div>
              <div className="cal-tides">
                <span>🌊 Low {t.low}</span><span>🌊 High {t.high}</span>
                <span>🪨 Basin {t.basin}</span><span>🏝 Goose {t.goose}</span>
              </div>
              <div className="cal-body">
                {byDay[dk].map((e,i)=>{
                  const c=CATS[e.act.cat];
                  return (
                    <div key={i} className="cal-event" style={{borderLeftColor:c.color,background:c.bg}}>
                      <div className="cal-time" style={{color:c.color}}>{e.time}</div>
                      <div className="cal-info">
                        <div className="cal-name">
                          {e.act.title}
                          {e.pinned && <span className="cal-pin">PINNED</span>}
                        </div>
                        {e.note && <div className="cal-note">{e.note}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
